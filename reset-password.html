<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForSync | Nueva Contraseña</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { padding-top: 0; display: flex; align-items: center; justify-content: center; min-height: 100vh; background: var(--bg); }
        .reset-wrap { width: 100%; max-width: 420px; padding: 24px; }
        .reset-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px; padding: 44px 40px; box-shadow: var(--sombra); }
        .reset-icon { width: 64px; height: 64px; border-radius: 50%; background: rgba(249,115,22,0.12); display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 1.6rem; color: var(--salmon); }
        .reset-card h2 { color: var(--texto); font-family: 'Outfit', sans-serif; text-align: center; margin-bottom: 8px; font-size: 1.5rem; }
        .reset-card p { color: var(--texto-sub); font-size: 0.88rem; text-align: center; margin-bottom: 28px; }
        .inp { width: 100%; padding: 13px 16px; background: var(--bg-card2); border: 1px solid var(--border); border-radius: 12px; font-size: 0.92rem; color: var(--texto); font-family: 'Inter', sans-serif; transition: 0.3s; margin-bottom: 14px; }
        .inp::placeholder { color: var(--texto-muted); }
        .inp:focus { outline: none; border-color: var(--salmon); box-shadow: 0 0 0 3px rgba(249,115,22,0.12); }
        .btn-full { width: 100%; padding: 13px; border-radius: 12px; border: none; background: linear-gradient(135deg, #F97316, #EA580C); color: white; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; font-size: 0.92rem; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .btn-full:hover { filter: brightness(1.08); transform: translateY(-1px); }
        .success-box { background: rgba(16,185,129,0.08); border: 1px solid rgba(16,185,129,0.25); border-radius: 12px; padding: 28px; text-align: center; }
        .success-box i { font-size: 2.5rem; color: #10B981; display: block; margin-bottom: 12px; }
        .success-box h3 { color: var(--texto); margin-bottom: 8px; }
        .success-box p { color: var(--texto-sub); font-size: 0.85rem; margin-bottom: 16px; }
        .error-box { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.25); border-radius: 12px; padding: 28px; text-align: center; }
        .error-box i { font-size: 2.5rem; color: #EF4444; display: block; margin-bottom: 12px; }
        .error-box h3 { color: var(--texto); margin-bottom: 8px; }
        .error-box p { color: var(--texto-sub); font-size: 0.85rem; margin-bottom: 16px; }
        .back-link { display: flex; align-items: center; justify-content: center; gap: 6px; color: var(--texto-muted); font-size: 0.85rem; margin-bottom: 24px; transition: 0.2s; }
        .back-link:hover { color: var(--texto); }
    </style>
</head>
<body>
    <div class="reset-wrap">
        <a href="login.html" class="back-link"><i class="fa-solid fa-arrow-left"></i> Volver al login</a>
        <div class="reset-card">
            <div class="reset-icon"><i class="fa-solid fa-key"></i></div>
            <h2>Nueva Contraseña</h2>
            <p>Ingresa tu nueva contraseña para la cuenta de ForSync.</p>
            <div id="formWrapper">
                <input class="inp" type="password" id="newPwd"  placeholder="Nueva contraseña (mín. 6 caracteres)" minlength="6">
                <input class="inp" type="password" id="confPwd" placeholder="Confirmar contraseña" minlength="6">
                <button class="btn-full" onclick="setNewPassword()">
                    <i class="fa-solid fa-floppy-disk"></i> Guardar contraseña
                </button>
            </div>
            <div id="successMsg" style="display:none;" class="success-box">
                <i class="fa-solid fa-circle-check"></i>
                <h3>¡Contraseña actualizada!</h3>
                <p>Ya puedes iniciar sesión con tu nueva contraseña.</p>
                <a href="login.html" style="display:inline-flex;align-items:center;gap:8px;padding:10px 24px;border-radius:50px;background:linear-gradient(135deg,#F97316,#EA580C);color:white;font-weight:600;font-size:0.88rem;">
                    <i class="fa-solid fa-right-to-bracket"></i> Ir al Login
                </a>
            </div>
            <div id="errorMsg" style="display:none;" class="error-box">
                <i class="fa-solid fa-circle-xmark"></i>
                <h3>Enlace inválido</h3>
                <p>Este enlace ha expirado o ya fue usado. Solicita uno nuevo.</p>
                <a href="login.html" style="display:inline-flex;align-items:center;gap:8px;padding:10px 24px;border-radius:50px;background:linear-gradient(135deg,#3B82F6,#1D4ED8);color:white;font-weight:600;font-size:0.88rem;">
                    <i class="fa-solid fa-arrow-left"></i> Volver al Login
                </a>
            </div>
        </div>
    </div>
    <div id="toastContainer" class="toast-container"></div>
    <script src="scripts.js"></script>
    <script>
        async function setNewPassword() {
            var np = document.getElementById('newPwd');
            var cp = document.getElementById('confPwd');
            if (!np.value || np.value.length < 6) { showToast('Mínimo 6 caracteres', 'error'); return; }
            if (np.value !== cp.value) { showToast('Las contraseñas no coinciden', 'error'); return; }
            var token = new URLSearchParams(window.location.search).get('token');
            if (!token) { document.getElementById('formWrapper').style.display='none'; document.getElementById('errorMsg').style.display='block'; return; }
            var res = await fetch('/api/auth?action=reset-password', {
                method:'POST', headers:{'Content-Type':'application/json'},
                body: JSON.stringify({ token, password: np.value })
            });
            var data = await res.json();
            if (data.error) { document.getElementById('formWrapper').style.display='none'; document.getElementById('errorMsg').style.display='block'; return; }
            document.getElementById('formWrapper').style.display='none';
            document.getElementById('successMsg').style.display='block';
        }
    </script>
</body>
</html>
