<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForSync | Nueva Contraseña</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        .reset-card { max-width:420px; margin:120px auto; background:white; border-radius:20px; padding:40px; box-shadow:0 8px 30px rgba(0,0,0,0.12); }
        .reset-card h2 { color:var(--azul-oscuro); margin-bottom:8px; font-family:'Outfit',sans-serif; }
        .reset-card p { color:var(--texto-gris); font-size:0.9rem; margin-bottom:25px; }
        .form-group { margin-bottom:15px; }
        .form-group input { width:100%; padding:12px 16px; border:2px solid #e0e0e0; border-radius:10px; font-size:0.95rem; font-family:'Inter',sans-serif; transition:0.3s; }
        .form-group input:focus { outline:none; border-color:#2563EB; box-shadow:0 0 0 3px rgba(37,99,235,0.1); }
    </style>
</head>
<body>
    <nav class="navbar"><a href="index.html" class="logo"><i class="fa-solid fa-code"></i> ForSync</a></nav>
    <div class="reset-card">
        <h2><i class="fa-solid fa-key" style="color:var(--salmon);"></i> Nueva Contraseña</h2>
        <p>Ingresa tu nueva contraseña para la cuenta de ForSync.</p>
        <div id="formWrapper">
            <div class="form-group"><input type="password" id="newPwd" placeholder="Nueva contraseña (mín. 6 caracteres)" minlength="6" required></div>
            <div class="form-group"><input type="password" id="confPwd" placeholder="Confirmar contraseña" minlength="6" required></div>
            <button class="btn btn-salmon" style="width:100%;" onclick="setNewPassword()"><i class="fa-solid fa-floppy-disk"></i> Guardar contraseña</button>
        </div>
        <div id="successMsg" style="display:none;text-align:center;">
            <i class="fa-solid fa-circle-check" style="font-size:3rem;color:#10B981;margin-bottom:15px;display:block;"></i>
            <h3>¡Contraseña actualizada!</h3>
            <p style="margin:10px 0 20px;">Ya puedes iniciar sesión con tu nueva contraseña.</p>
            <a href="login.html" class="btn btn-salmon"><i class="fa-solid fa-right-to-bracket"></i> Ir al Login</a>
        </div>
        <div id="errorMsg" style="display:none;text-align:center;">
            <i class="fa-solid fa-circle-xmark" style="font-size:3rem;color:#EF4444;margin-bottom:15px;display:block;"></i>
            <h3>Enlace inválido o expirado</h3>
            <p style="margin:10px 0 20px;">Por favor solicita un nuevo enlace de recuperación.</p>
            <a href="login.html" class="btn btn-azul"><i class="fa-solid fa-arrow-left"></i> Volver al Login</a>
        </div>
    </div>
    <div id="toastContainer" class="toast-container"></div>
    <script src="scripts.js"></script>
    <script>
        async function setNewPassword() {
            var np = document.getElementById('newPwd');
            var cp = document.getElementById('confPwd');
            if (!np.value || np.value.length < 6) { showToast('Mínimo 6 caracteres', 'error'); return; }
            if (np.value !== cp.value) { showToast('Las contraseñas no coinciden', 'error'); return; }
            var token = new URLSearchParams(window.location.search).get('token');
            if (!token) { document.getElementById('formWrapper').style.display='none'; document.getElementById('errorMsg').style.display='block'; return; }
            var res = await fetch('/api/auth?action=reset-password', {
                method:'POST', headers:{'Content-Type':'application/json'},
                body: JSON.stringify({ token, password: np.value })
            });
            var data = await res.json();
            if (data.error) { document.getElementById('formWrapper').style.display='none'; document.getElementById('errorMsg').style.display='block'; return; }
            document.getElementById('formWrapper').style.display='none';
            document.getElementById('successMsg').style.display='block';
        }
    </script>
</body>
</html>
